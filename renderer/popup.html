<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 35px; height: 35px; }
    body {
      background: transparent;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }
    .icon {
      width: 35px; height: 35px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #3a3a3a, #0d0d0d 70%);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      user-select: none;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .logo {
      color: #fff;
      font-size: 20px; margin-top: -1px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="icon" id="collectBtn">
    <span class="logo">CC</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
